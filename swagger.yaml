swagger: "2.0"
info:
  title: Coffee Shop Order API
  description: |
    A local API built with Flask and Python to manage coffee shop orders.
    Orders are stored in a local SQLite database.
  version: 1.0.0
  contact:
    name: API Support
    email: dev@localhost

host: localhost:5000
basePath: /
schemes:
  - http

paths:
  /orders:
    get:
      summary: List all orders
      operationId: listOrders
      produces:
        - application/json
      responses:
        200:
          description: A list of orders
          schema:
            type: array
            items:
              $ref: '#/definitions/Order'
        500:
          description: Internal server error

    post:
      summary: Create a new order
      operationId: createOrder
      consumes:
        - application/json
      produces:
        - application/json
      parameters:
        - in: body
          name: body
          required: true
          schema:
            $ref: '#/definitions/CreateOrderRequest'
      responses:
        201:
          description: Order successfully created
          schema:
            $ref: '#/definitions/Order'
        400:
          description: Invalid input
        500:
          description: Internal server error

  /orders/{id}:
    get:
      summary: Get an order by ID
      operationId: getOrderById
      produces:
        - application/json
      parameters:
        - in: path
          name: id
          required: true
          type: integer
      responses:
        200:
          description: Order details
          schema:
            $ref: '#/definitions/Order'
        404:
          description: Order not found
        500:
          description: Internal server error

    put:
      summary: Update an order
      operationId: updateOrder
      consumes:
        - application/json
      produces:
        - application/json
      parameters:
        - in: path
          name: id
          required: true
          type: integer
        - in: body
          name: body
          required: true
          schema:
            $ref: '#/definitions/CreateOrderRequest'
      responses:
        200:
          description: Order successfully updated
          schema:
            $ref: '#/definitions/Order'
        404:
          description: Order not found
        400:
          description: Invalid input
        500:
          description: Internal server error

    delete:
      summary: Delete an order
      operationId: deleteOrder
      produces:
        - application/json
      parameters:
        - in: path
          name: id
          required: true
          type: integer
      responses:
        204:
          description: Order successfully deleted
        404:
          description: Order not found
        500:
          description: Internal server error

definitions:
  Order:
    type: object
    properties:
      id:
        type: integer
        example: 1
      content:
        type: string
        maxLength: 100
        example: "Double Espresso"
      created:
        type: string
        format: date-time
        example: "2026-03-22T14:30:00Z"
    required:
      - id
      - content
      - created

  CreateOrderRequest:
    type: object
    properties:
      content:
        type: string
        maxLength: 100
        example: "Cappuccino with oat milk"
    required:
      - content